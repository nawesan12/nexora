services:
  postgres:
    image: postgres:16-alpine
    container_name: pronto-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: pronto
      POSTGRES_PASSWORD: pronto
      POSTGRES_DB: pronto
    volumes:
      - pronto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pronto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pronto-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - pronto-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pronto-pgdata:
  pronto-redis:
