app = "pronto-api"
primary_region = "gru"  # São Paulo — closest to Argentina

[build]
  dockerfile = "Dockerfile"

[env]
  API_PORT = "8080"
  API_HOST = "0.0.0.0"
  API_ENV = "production"
  APP_URL = "https://pronto.vercel.app"
  CORS_ALLOWED_ORIGINS = "https://pronto.vercel.app"
  JWT_EXPIRY = "15m"
  JWT_REFRESH_EXPIRY = "168h"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
