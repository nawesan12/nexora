<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#134E4A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="mark" x1="120" y1="112" x2="392" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#99F6E4"/>
      <stop offset="50%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="#0F766E" stroke-width="1" opacity="0.3"/>
  <!-- P lettermark: vertical bar -->
  <rect x="136" y="128" width="52" height="256" rx="8" fill="url(#mark)"/>
  <!-- P lettermark: bowl (rounded arc from top of bar) -->
  <path d="M188 128 L280 128 Q368 128 368 220 Q368 312 280 312 L188 312 L188 260 L272 260 Q316 260 316 220 Q316 180 272 180 L188 180 Z" fill="url(#mark)" opacity="0.9"/>
  <!-- Accent spark -->
  <g filter="glow" opacity="0.85">
    <path d="M408 108 L418 128 L408 148 L398 128 Z" fill="#FBBF24"/>
  </g>
  <!-- Subtle reflection -->
  <rect x="160" y="404" width="192" height="3" rx="1.5" fill="#5EEAD4" opacity="0.2"/>
</svg>
